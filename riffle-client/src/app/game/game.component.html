<div class="container mt-1">
  @if (state.gameView === GameView.GameLobby || state.gameView === undefined) {
    <div>
      <app-game-lobby [state]="state"></app-game-lobby>
    </div>
  }

  @if (state.gameView === GameView.Swapping) {
    <div>
      <app-swapping [state]="state"></app-swapping>
    </div>
  }

  @if (state.gameView === GameView.Showdown) {
    <div>
      <app-showdown [state]="state"></app-showdown>
    </div>
  }
</div>
